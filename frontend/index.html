<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liga Independiente de Pool</title>
  <link rel="icon" href="./logo_liga.png" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MS31S9P5K7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MS31S9P5K7');
  </script>

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="./logo_liga.png" alt="Liga Independiente de Pool" class="brand__logo">
      <span class="brand__cta">INGRESÁ PARA GESTIONAR TUS JUGADORES Y PRÓXIMOS ENCUENTROS</span>
    </div>

    <div class="actions">
      <button id="btnBanner" class="btn btn-outline btn-sm hidden">Banner</button>
      <a id="btnAdminEquipos" class="btn btn-outline btn-sm hidden" href="#">Administrar equipos</a>

      <div id="sessionBox">
        <button id="btnIngresar" class="btn btn-primary">Ingresar</button>
      </div>
    </div>
  </header>

  <main class="hero">
    <div class="hero__logo-wrap">
      <img src="./logo_liga.png" alt="Logo Liga" class="hero__logo">
    </div>

    <h1 class="title">LIGA INDEPENDIENTE DE POOL</h1>

    <div class="well">
      <p id="bannerMessage">Bienvenidos a la Liga de Pool Independiente</p>
    </div>

    <div id="bannerDots" class="banner-dots"></div>

    <div class="cta-grid">
      <a class="btn btn-lg btn-cta" href="./primera.html">Primera</a>
      <a class="btn btn-lg btn-cta" href="./tablas/tabla_segunda.html">Segunda</a>
      <a class="btn btn-lg btn-cta" href="./tablas/tabla_tercera.html">Tercera</a>
    </div>
  </main>

  <div id="sessionBar" class="session hidden">
    <span id="greeting" class="session__greeting">Hola, EQUIPO!</span>
    <div class="session__actions">
      <button id="btnLogout" class="btn btn-ghost">Cerrar sesión</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <a class="site-footer__link" href="./politica-privacidad.html">Política de Privacidad</a>
      <span class="site-footer__stats" id="statsBar">Online: — | Hoy: — | Semana: —</span>
    </div>
  </footer>

  <script src="./config.js"></script>
  <script type="module" src="./templates/banner.js" defer></script>
  <script type="module" src="./app.js" defer></script>
  <script type="module" src="./index.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planillas automáticas | LIPA</title>
  <style>
    :root{
      --bg:#000;
      --panel:#0b0b0f;
      --text:#fff6c1;
      --muted:#b8ab61;
      --gold:#f3cf1a;
      --gold-2:#ffea6b;
      --line:#4c3d00;
      --danger:#ff6b6b;
      --ok:#68d391;
      --shadow:0 10px 24px rgba(0,0,0,.34);

      --page-w:210mm;
      --page-h:297mm;
      --page-w-px:793.701px;
      --page-h-px:1122.52px;
      --page-pad:10mm;
      --sheet-zoom:0.62;
      --sheet-gap:22px;
      --grid-border:2px solid #000;
      --logo-col:140px;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:Arial, Helvetica, sans-serif; }
    body{ min-height:100vh; }

    .topbar{
      position:sticky; top:0; z-index:20;
      background:rgba(0,0,0,.95);
      backdrop-filter: blur(6px);
      border-bottom:1px solid rgba(243,207,26,.18);
      padding:10px 20px;
    }

    .topbar-inner{
      max-width:1700px; margin:0 auto;
      display:flex; gap:14px; align-items:center; justify-content:space-between; flex-wrap:wrap;
    }

    .brand{
      display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    }

    .brand img{ height:60px; width:auto; display:block; }

    .brand h1{
      margin:0; font-size:36px; line-height:1; color:var(--gold); letter-spacing:.5px; font-weight:900; text-transform:uppercase;
    }

    .toolbar{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;
    }

    .toolbar-main{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }

    .segmented{
      display:flex; gap:10px; flex-wrap:wrap;
    }

    .btn{
      appearance:none; border:1px solid rgba(243,207,26,.35); background:linear-gradient(180deg,#1a1a12,#090909);
      color:var(--gold-2); font-weight:800; text-transform:uppercase; letter-spacing:.3px;
      border-radius:14px; padding:11px 16px; cursor:pointer; transition:.18s ease;
      box-shadow:var(--shadow); text-decoration:none;
    }
    .btn:hover{ transform:translateY(-1px); border-color:rgba(243,207,26,.55); }
    .btn.active{ background:linear-gradient(180deg,#ffe24b,#f3c900); color:#111; border-color:#f4d84f; }
    .btn.secondary{ color:#fff3ae; }
    .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

    .btn-gold{
      display:inline-flex; align-items:center; justify-content:center;
      padding:11px 18px; border-radius:14px;
      background:linear-gradient(180deg,#ffd86a 0%, #e8b127 100%);
      border:1px solid #8e6a12; color:#111; font-weight:900;
      letter-spacing:.5px; text-transform:uppercase; text-decoration:none;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.6), 0 3px 8px rgba(0,0,0,.35);
      transition:filter .15s ease, transform .05s ease;
    }
    .btn-gold:hover{ filter:brightness(1.05); transform:translateY(-1px); }
    .btn-gold:active{ transform:translateY(1px); }

    .page{
      max-width:1700px; margin:0 auto; padding:24px 20px 38px;
    }

    .status-card{
      display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
      background:linear-gradient(180deg,var(--panel),#070708);
      border:1px solid rgba(243,207,26,.18);
      border-radius:20px; padding:16px 18px; box-shadow:var(--shadow); margin-bottom:22px;
    }

    .status-main{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .status-dot{ width:12px; height:12px; border-radius:999px; background:#666; box-shadow:0 0 0 4px rgba(255,255,255,.04); }
    .status-dot.ok{ background:var(--ok); }
    .status-dot.warn{ background:#f6c343; }
    .status-dot.error{ background:var(--danger); }
    .status-text{ font-size:15px; color:#fff9cf; }
    .meta{ font-size:13px; color:var(--muted); }

    .sheets-stack{
      display:grid;
      gap:var(--sheet-gap);
      justify-items:center;
      align-content:start;
    }

    .sheet-shell{
      width:calc(var(--page-w-px) * var(--sheet-zoom));
      min-width:calc(var(--page-w-px) * var(--sheet-zoom));
    }

    .sheet-head{
      margin-bottom:10px;
      padding:12px 14px;
      border-radius:18px;
      background:linear-gradient(180deg,var(--panel),#070708);
      border:1px solid rgba(243,207,26,.18);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .sheet-title{
      margin:0;
      font-size:20px;
      color:var(--gold-2);
      font-weight:900;
      text-transform:uppercase;
      line-height:1.1;
    }

    .sheet-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .sheet-viewport{
      width:calc(var(--page-w-px) * var(--sheet-zoom));
      height:calc(var(--page-h-px) * var(--sheet-zoom));
      overflow:hidden;
      border-radius:18px;
      box-shadow:var(--shadow);
      background:#d9d9d9;
    }

    .sheet-page{
      width:var(--page-w-px);
      min-height:var(--page-h-px);
      padding:var(--page-pad);
      background:#fff;
      color:#000;
      transform:scale(var(--sheet-zoom));
      transform-origin:top left;
      border:1px solid #000;
    }

    .page-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      color:#333;
      margin-bottom:2mm;
    }

    .league-title{
      margin:0;
      text-align:center;
      font-size:24px;
      font-weight:800;
      letter-spacing:.5px;
      text-transform:uppercase;
    }

    .bar{
      height:14px;
      background:#b5b5b5;
      margin:6px 0 14px;
    }

    .header-grid{
      display:grid;
      grid-template-columns:1fr var(--logo-col) 1fr;
      align-items:start;
      column-gap:18px;
      margin-top:2px;
    }

    .logo-box{
      display:grid;
      place-items:center;
      min-height:64px;
    }

    .logo-box img{
      max-width:100%;
      max-height:64px;
      object-fit:contain;
      display:block;
    }

    table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      color:#000;
    }

    td, th{
      border:var(--grid-border);
      padding:0;
      font-size:14px;
      background:#fff;
    }

    .form td, .form th{ height:30px; }
    .label-cell{
      width:95px;
      font-weight:800;
      text-transform:uppercase;
      text-align:center;
      white-space:nowrap;
      padding:4px 6px;
    }

    .section{ margin-top:14px; }

    .ind-head th{
      font-weight:800;
      text-transform:uppercase;
      text-align:center;
      font-size:14px;
      height:28px;
      letter-spacing:.3px;
    }

    .ind-row td{ height:26px; }
    .center-col{
      vertical-align:middle;
      font-weight:700;
      text-align:center;
      border-left:var(--grid-border);
      border-right:var(--grid-border);
    }

    .doubles-section{
      margin-top:12px;
      position:relative;
      padding-top:18px;
    }

    .doubles-label{
      position:absolute;
      top:-12px;
      left:50%;
      transform:translateX(-50%);
      padding:3px 16px;
      font-weight:800;
      text-transform:uppercase;
      background:#fff;
    }

    .doubles td{ height:28px; }
    .vs-merged{
      text-align:center;
      font-weight:700;
      vertical-align:middle;
    }

    .result-section{ margin-top:18px; }
    .result th, .result td{ height:28px; }
    .result th{
      text-transform:uppercase;
      font-weight:800;
      text-align:center;
      font-size:14px;
    }
    .tri-left, .tri-right{
      font-weight:800;
      text-transform:uppercase;
      font-size:12px;
    }
    .tri-left{ text-align:right; padding-right:10px; }
    .tri-right{ text-align:left; padding-left:10px; }
    .tri-left::after{ content: ":"; margin-left:.2ch; }
    .tri-right::before{ content: ":"; margin-right:.2ch; }

    .subs{
      margin-top:18px;
    }

    .subs-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      column-gap:40px;
      align-items:start;
    }

    .subs-table th, .subs-table td{ height:26px; }
    .subs-table th{
      text-transform:uppercase;
      font-weight:800;
      text-align:center;
      font-size:14px;
    }

    .signatures{
      margin-top:70px;
      display:grid;
      grid-template-columns:1fr 1fr;
      column-gap:120px;
      align-items:end;
    }

    .sig{
      display:grid;
      justify-items:center;
      gap:12px;
      padding-top:10px;
    }

    .sig-line{
      width:85%;
      border-top:1px dotted #000;
      height:0;
    }

    .sig-label{
      font-size:14px;
      font-weight:800;
      text-transform:uppercase;
      color:#000;
    }

    .empty{
      background:linear-gradient(180deg,var(--panel),#080808);
      border:1px dashed rgba(243,207,26,.25);
      border-radius:18px; padding:42px 22px; text-align:center; color:var(--muted);
      box-shadow:var(--shadow);
      width:100%;
    }

    .hint{ font-size:13px; color:var(--muted); }

    @media (max-width: 920px){
      .brand h1{ font-size:28px; }
      .brand img{ height:48px; }
      .topbar-inner{ justify-content:center; }
      .toolbar{ justify-content:center; }
      :root{ --sheet-zoom:0.43; }
    }

    @media print{
      @page{ size:A4 portrait; margin:10mm; }

      body{ background:#fff !important; color:#000 !important; }
      .topbar, .status-card, .sheet-head{ display:none !important; }
      .page{ max-width:none; padding:0; }
      .sheets-stack{ display:block; }
      .sheet-shell, .sheet-viewport{
        width:auto !important;
        height:auto !important;
        min-width:0 !important;
        overflow:visible !important;
        box-shadow:none !important;
        border-radius:0 !important;
        background:transparent !important;
      }
      .sheet-page{
        width:210mm !important;
        min-height:297mm !important;
        transform:none !important;
        border:none !important;
        box-shadow:none !important;
        padding:0 !important;
        margin:0 0 0 0 !important;
        break-after:page;
      }
      .page-meta{ display:none !important; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a href="../index.html" title="Inicio"><img src="../logo_liga.png" alt="LIPA" /></a>
        <h1>Planillas automáticas</h1>
      </div>
      <div class="toolbar">
        <div class="toolbar-main">
          <div class="segmented" id="categoryButtons">
            <button class="btn active" data-category="tercera" type="button">Tercera</button>
            <button class="btn" data-category="segunda" type="button">Segunda</button>
          </div>
          <button class="btn secondary" id="btnRefresh" type="button">Actualizar</button>
          <button class="btn" id="btnPdfZip" type="button">Descargar PDFs</button>
          <button class="btn secondary" id="btnJpgZip" type="button">Descargar JPGs</button>
        </div>
        <a class="btn-gold" href="../admin.html">Volver</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="status-card">
      <div class="status-main">
        <div class="status-dot" id="statusDot"></div>
        <div>
          <div class="status-text" id="statusText">Cargando planillas...</div>
          <div class="meta" id="statusMeta">Esperando datos del backend</div>
        </div>
      </div>
      <div class="hint" id="statusHint">Las planillas se renderizan en A4 fijo y en pantalla se ajustan con zoom general.</div>
    </section>

    <section class="sheets-stack" id="grid"></section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="./planillas_auto.js"></script>
</body>
</html>

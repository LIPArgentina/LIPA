<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>CONSULTAS | Liga de Pool Independiente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="consultas.css"/>
</head>
<body>
<div class="container">
  <header>
    <a href="../index.html" title="Inicio"><img alt="LPI" src="../logo_liga.png"/></a>
    <div class="header-center">
      <div class="title">CONSULTAS</div>
    </div>
    <nav class="actions">
      <a class="btn" href="../index.html">VOLVER</a>
    </nav>
  </header>

  <main class="consultas-page">
    <section class="consultas-hero">
      <p class="eyebrow">Cruces validados</p>
      <h1>Consulta por jugador</h1>
      <p class="lead">Buscá un jugador individual por nombre o apellido para ver partidos jugados y triángulos a favor/en contra.</p>
    </section>

    <section class="search-card" aria-label="Buscar jugador">
      <form id="consultaForm" class="search-form" autocomplete="off">
        <div class="field">
          <label for="categorySelect">Categoría</label>
          <select id="categorySelect" required>
            <option value="segunda">Segunda</option>
            <option value="tercera">Tercera</option>
          </select>
        </div>

        <div class="field field-player">
          <label for="playerInput">Jugador</label>
          <input id="playerInput" type="search" list="playerSuggestions" placeholder="Nombre o apellido" required minlength="2" />
          <datalist id="playerSuggestions"></datalist>
        </div>

        <button id="btnBuscar" class="btn btn-primary" type="submit">Buscar</button>
      </form>
    </section>

    <section id="statusBox" class="status-box" hidden></section>
    <section id="summaryBox" class="summary-box" hidden></section>
    <section id="resultsBox" class="results-list" aria-live="polite"></section>
  </main>
</div>

<script src="../config.js"></script>
<script src="consultas.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Visor de Planillas (múltiple) | LPI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>
<link href="visor_planillas.css" rel="stylesheet"/>
</head>
<body>
<div id="alert" role="alert"></div>

<header class="site-header">
  <div class="header-top">
    <div class="header-left">
      <a class="brand-home" href="../index.html" title="Inicio">
        <img alt="LPI" src="../logo_liga.png"/>
      </a>
      <h1 class="title">VISOR DE PLANILLAS</h1>
    </div>

    <div class="top-right-actions">
      <a class="btn-gold volver" href="../admin.html">volver</a>
    </div>
  </div>

  <div class="center-action">
    <div class="center-action-inner">
      <div class="cruces-button-wrap">
        <button type="button" class="btn-gold" id="btnHabilitarCrucesTercera">habilitar cruces tercera</button>
        <div id="crucesStatusLabelTercera" class="cruces-status-label">los cruces de tercera están deshabilitados</div>
      </div>

      <div class="cruces-button-wrap">
        <button type="button" class="btn-gold" id="btnHabilitarCrucesSegunda">habilitar cruces segunda</button>
        <div id="crucesStatusLabelSegunda" class="cruces-status-label">los cruces de segunda están deshabilitados</div>
      </div>

      <div class="cruces-button-wrap cruces-button-wrap-link">
        <a href="https://lipa.ar/export/planillas_auto.html" class="btn-gold btn-gold-link">generar cruces</a>
      </div>

      <div id="globalJsIndicator" class="fresh-indicator fresh-stale" title="Comprobando fecha de planillas…"></div>
    </div>
  </div>
</header>

<div class="container">
  <main>
    <section class="category-filter-bar" aria-label="Filtros de categoría">
      <button type="button" class="btn-gold btn-filter" data-category-filter="tercera" aria-pressed="false">tercera</button>
      <button type="button" class="btn-gold btn-filter" data-category-filter="segunda" aria-pressed="false">segunda</button>
      <span id="categoryFilterStatus" class="category-filter-status">Mostrando todas las planillas</span>
    </section>

    <section aria-label="Planillas por equipo" class="grid-boards" id="boards">
      <!-- Se generan por JS -->
    </section>
  </main>
</div>

<script src="visor_planillas.js"></script>
</body>
</html>

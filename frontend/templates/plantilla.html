<!-- ===== Modal Cambiar contraseña (Equipo) ===== -->
<dialog class="modal" id="passModal">
<form autocomplete="off" class="modal__panel" id="passForm" method="dialog" style="min-width:320px;">
<div class="modal__header"><h3>Cambiar contraseña</h3></div>
<div class="modal__body">
<label class="field__label">Contraseña actual</label>
<input class="field__control" id="oldPass" type="password"/>
<label class="field__toggle" for="toggle_oldPass">
<input data-toggle="#oldPass" id="toggle_oldPass" type="checkbox"/> Mostrar
        </label>
<label class="field__label">Nueva contraseña</label>
<input class="field__control" id="newPass" type="password">
<label class="field__toggle" for="toggle_newPass">
<input data-toggle="#newPass" id="toggle_newPass" type="checkbox"/> Mostrar
        </label>
<label class="field__label">Repetir nueva contraseña</label>
<input class="field__control" id="newPass2" type="password">
<label class="field__toggle" for="toggle_newPass2">
<input data-toggle="#newPass2" id="toggle_newPass2" type="checkbox"/> Mostrar
        </label>
<p class="error" id="passError" style="display:none;color:#ff6b6b;margin-top:8px;">Revisá los campos</p>
<p class="success" id="passSuccess" style="display:none;color:#4cd964;margin-top:8px;">¡Contraseña actualizada!</p>
</input></input></div>
<div class="modal__footer">
<button class="btn btn-ghost" value="cancel">Cancelar</button>
<button class="btn btn-primary" id="submitPass" value="confirm">Guardar</button>
</div>
</form>
</dialog>




<!-- Unificador: usar un solo evento para cargar lista de jugadores -->

<script>
(function () {
  try {
    const params = new URLSearchParams(window.location.search);
    const hasAppParam = params.get("app") === "true";

    if (hasAppParam) {
      sessionStorage.setItem("lipa_app_mode", "true");
    }

    const isApp = hasAppParam || sessionStorage.getItem("lipa_app_mode") === "true";

    if (isApp) {
      const header = document.querySelector("header");
      if (header) {
        header.style.display = "none";
      }
    }
  } catch (e) {}
})();
</script>


<script src="../config.js"></script>
<script src="./plantilla.js"></script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liga de Pool - v29 (zoom responsive)</title>
<style>
  :root {
    /* Tamaño A4 (mm) + equivalentes en px (96 dpi) */
    --page-w: 210mm;
    --page-h: 297mm;
    --page-w-px: 793.701px;  /* 210 * 96 / 25.4 */
    --page-h-px: 1122.52px;  /* 297 * 96 / 25.4 */

    --logo-col: 140px;
    --grid: 2px solid #000;
  }

  *{ box-sizing: border-box; }
  body{ margin: 0; font-family: Arial, Helvetica, sans-serif; color: #000; background: #fff; }

  /* Página base A4 */
  .page{ width: var(--page-w); min-height: var(--page-h); margin: 0 auto; padding: 10mm; outline: 1px solid #000; display:flex; flex-direction:column; gap:12px; }

  .title{ text-align: center; font-weight: 800; font-size: 24px; letter-spacing: .5px; text-transform: uppercase; margin: 0; }
  .title-bar{ height: 14px; background: #b5b5b5; margin: 6px 0 14px; }

  /* Header */
  .header-grid{ display: grid; grid-template-columns: 1fr var(--logo-col) 1fr; align-items: start; column-gap: 18px; margin-top: 2px; }
  .header-box{ padding: 0; }
  table.form{ width: 100%; border-collapse: collapse; table-layout: fixed; }
  .form td, .form th{ border: var(--grid); height: 30px; padding: 0; font-size: 14px; }
  .label-cell{ width: 95px; font-weight: 800; text-transform: uppercase; text-align: center; white-space: nowrap; padding: 4px 6px; }
  .right .label-cell{ width: 105px; }
  .logo-slot{ display: grid; place-items: center; }
  .logo-slot img{ max-width: 100%; max-height: 64px; object-fit: contain; display: block; }

  /* INDIVIDUALES */
  .section{ margin-top: 6px; }
  table.ind-table{ width: 100%; border-collapse: collapse; table-layout: fixed; }
  .ind-table th, .ind-table td{ border: var(--grid); padding: 0; }
  .ind-head th{ background: #fff; font-weight: 800; text-transform: uppercase; text-align: center; font-size: 14px; height: 28px; letter-spacing: .3px; }
  colgroup col.l-main{ width: 32.5%; }
  colgroup col.l-div{ width: 5%; }
  colgroup col.center{ width: 25%; }
  colgroup col.r-div{ width: 5%; }
  colgroup col.r-main{ width: 32.5%; }
  .ind-table tbody td{ height: 26px; }
  .center-col{ vertical-align: middle; font-weight: 700; text-align: center; border-left: var(--grid); border-right: var(--grid); }

  /* PAREJAS */
  .section-doubles{ margin-top: 12px; position: relative; }
  .doubles-wrap{ position: relative; padding-top: 18px; }
  .doubles-label{ position: absolute; top: -12px; left: 50%; transform: translateX(-50%); padding: 3px 16px; font-weight: 800; text-transform: uppercase; background: #fff;  }
  table.doubles{ width: 100%; border-collapse: collapse; table-layout: fixed; }
  .doubles td, .doubles th{ border: var(--grid); padding: 0; height: 28px; }
  .d-col-lname{ width: 32.5%; } .d-col-lnar{ width: 5%; } .d-col-center{ width: 25%; } .d-col-rnar{ width: 5%; } .d-col-rname{ width: 32.5%; }
  .vs-merged{ text-align: center; font-weight: 700; vertical-align: middle; }

  /* RESULTADO FINAL */
  .section-result{ margin-top: 12px; }
  table.result{ width: 100%; border-collapse: collapse; table-layout: fixed; }
  .result th, .result td{ border: var(--grid); padding: 0; height: 28px; }
  .res-l{ width: 32.5%; } .res-c1{ width: 12.5%; } .res-c2{ width: 12.5%; } .res-r{ width: 32.5%; }
  .result th{ text-transform: uppercase; font-weight: 800; text-align: center; font-size: 14px; }
  .tri-left, .tri-right{ padding-left: 10px;  font-weight: 800; text-transform: uppercase; font-size: 12px; }
  .tri-left{ text-align: right; padding-right: 10px; }
  .tri-right{ text-align: left; padding-left: 10px; }

  /* SUPLENTES */
  .subs{ margin-top: 12px; }
  .subs-grid{ display: grid; grid-template-columns: 1fr 1fr; column-gap: 40px; align-items: start; }
  table.subs-table{ width: 100%; border-collapse: collapse; table-layout: fixed; }
  .subs-table th, .subs-table td{ border: var(--grid); padding: 0; height: 26px; }
  .subs-table th{ text-transform: uppercase; font-weight: 800; text-align: center; font-size: 14px; }

  /* FIRMAS */
  .signatures{ margin-top: 70px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 120px; align-items: end; }
  .sig-block{ display: grid; justify-items: center; gap: 12px; padding: 10px 0 0; }
  .sig-line{ width: 85%; border-top: 1px dotted #000; height: 0; }
  .sig-label{ font-weight: 800; text-transform: uppercase; font-size: 14px; }

  /* ====== IMPRESIÓN (A4 real) ====== */
  @page { size: A4 portrait; margin: 10mm; }
  @media print {
    * {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      box-shadow: none !important;
      text-shadow: none !important;
    }
    html, body { margin: 0; padding: 0; background: #fff; }
    .page { width: auto; min-height: auto; margin: 0; padding: 0; outline: none; zoom: 1 !important; }
    .title-bar { height: 0; border-top: 2px solid #000; margin: 6px 0 10px; }
    table { border-collapse: collapse; border-spacing: 0; }
    th, td { border: 2px solid #000; }
    .center-col { vertical-align: middle; font-weight: 700; text-align: center; border-left: 2px solid #000; border-right: 2px solid #000; }
    .sig-line { border-top: 1px dotted #000; }
  }

  .tri-left::after{ content: ":"; margin-left: .2ch; }
  .tri-right::before{ content: ":"; margin-right: .2ch; }

  /* ====== PANTALLA: escalado por `zoom` ======
     - Usa la altura real en px para calcular una escala estable ante zoom del navegador
     - Evita `transform: scale(...)` para que el texto se reduzca/aumente realmente */
  @media screen {
    :root{
      --vpad: 24px;
      --zoom: min(1, calc((100vh - var(--vpad)) / var(--page-h-px)));
    }
    html, body { height: 100%; }
    body{
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
      background: #f7f7f7;
    }
    .page{
      /* Fijamos dimensiones en px para que el zoom sea proporcional */
      width: var(--page-w-px);
      min-height: var(--page-h-px);
      /* Escala real de todo el contenido, incluida la tipografía */
      zoom: var(--zoom);
      /* Anulamos cualquier transform heredado para evitar doble escala */
      transform: none !important;
    }
  }
</style>
</head>
<body>
  <div class="page">
    <h1 class="title">LIGA DE POOL INDEPENDIENTE</h1>
    <div class="title-bar"></div>

    <div class="header-grid">
      <!-- Izquierda -->
      <div class="header-box">
        <table class="form" aria-label="Datos de sala local">
          <tr>
            <td class="label-cell">SALA</td>
            <td></td>
          </tr>
          <tr>
            <td class="label-cell">CAPITANÍA</td>
            <td></td>
          </tr>
        </table>
      </div>
      <!-- Centro: logo -->
      <div class="logo-slot"><img src="../logo_liga.png" alt="Logo Liga" /></div>
      <!-- Derecha -->
      <div class="header-box right">
        <table class="form" aria-label="Datos de sala visitante">
          <tr>
            <td></td>
            <td class="label-cell">SALA</td>
          </tr>
          <tr>
            <td></td>
            <td class="label-cell">CAPITANÍA</td>
          </tr>
        </table>
      </div>
    </div>

    <!-- INDIVIDUALES -->
    <div class="section">
      <table class="ind-table" aria-label="Partidos individuales">
        <colgroup>
          <col class="l-main"><col class="l-div"><col class="center"><col class="r-div"><col class="r-main">
        </colgroup>
        <thead class="ind-head">
          <tr>
            <th colspan="2">NOMBRE Y APELLIDO</th>
            <th>INDIVIDUALES</th>
            <th colspan="2">NOMBRE Y APELLIDO</th>
          </tr>
        </thead>
        <tbody>
          <tr><td></td><td></td><td class="center-col" rowspan="7">VS.</td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>
    </div>

    <!-- PAREJAS 1 -->
    <div class="section-doubles">
      <div class="doubles-wrap">
        <div class="doubles-label">Parejas 1</div>
        <table class="doubles" aria-label="Partidos de parejas 1">
          <tbody>
            <tr>
              <td class="d-col-lname"></td>
              <td class="d-col-lnar" rowspan="2"></td>
              <td class="d-col-center vs-merged" rowspan="2">VS.</td>
              <td class="d-col-rnar" rowspan="2"></td>
              <td class="d-col-rname"></td>
            </tr>
            <tr>
              <td class="d-col-lname"></td>
              <td class="d-col-rname"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PAREJAS 2 -->
    <div class="section-doubles">
      <div class="doubles-wrap">
        <div class="doubles-label">Parejas 2</div>
        <table class="doubles" aria-label="Partidos de parejas 2">
          <tbody>
            <tr>
              <td class="d-col-lname"></td>
              <td class="d-col-lnar" rowspan="2"></td>
              <td class="d-col-center vs-merged" rowspan="2">VS.</td>
              <td class="d-col-rnar" rowspan="2"></td>
              <td class="d-col-rname"></td>
            </tr>
            <tr>
              <td class="d-col-lname"></td>
              <td class="d-col-rname"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- RESULTADO FINAL -->
    <div class="section-result">
      <table class="result" aria-label="Resultado final">
        <thead>
          <tr>
            <th class="res-l">Sala</th>
            <th class="res-c1" colspan="2">Resultado Final</th>
            <th class="res-r">Sala</th>
          </tr>
        </thead>
        <tbody>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr>
            <td class="tri-left">Triángulos Totales</td>
            <td></td>
            <td></td>
            <td class="tri-right">Triángulos Totales</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- SUPLENTES -->
    <div class="subs">
      <div class="subs-grid">
        <div>
          <table class="subs-table" aria-label="Suplentes local">
            <thead><tr><th>Suplentes</th></tr></thead>
            <tbody><tr><td></td></tr><tr><td></td></tr></tbody>
          </table>
        </div>
        <div>
          <table class="subs-table" aria-label="Suplentes visitante">
            <thead><tr><th>Suplentes</th></tr></thead>
            <tbody><tr><td></td></tr><tr><td></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- FIRMAS -->
    <div class="signatures">
      <div class="sig-block"><div class="sig-line"></div><div class="sig-label">Firma Local</div></div>
      <div class="sig-block"><div class="sig-line"></div><div class="sig-label">Firma Visitante</div></div>
    </div>

  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segunda División - Liga de Pool Independiente</title>
  <style>
    :root{--bg:#0f0f12;--text:#eaeaf0;--gold:#ffcc00;}
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:linear-gradient(135deg,#0b0b10 0%,#14141a 60%,#0b0b10 100%);
      color:var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    header{
      position:fixed;
      top:0;left:0;width:100%;
      background:rgba(0,0,0,.85);
      border-bottom:1px solid rgba(255,255,255,.05);
      display:flex;
      align-items:center;
      padding:20px;
      z-index:1000;
    }
    .logo-link img{height:84px;}
    main{margin-top:160px;text-align:center;padding:20px;}
    h1{
      color:var(--gold);
      font-size:72px;
      text-transform:uppercase;
      text-shadow:0 2px 8px rgba(0,0,0,.5);
    }
  
    .proximamente{
      margin-top:20px;
      font-size:42px;
      color:#ffffff;
      letter-spacing:4px;
      animation:blinkGlow 1.5s infinite alternate;
      text-shadow:0 0 6px #fff,0 0 12px #ffcc00,0 0 18px #ffcc00;
    }
    @keyframes blinkGlow{
      from{opacity:0.3; transform:scale(0.98);}
      to{opacity:1; transform:scale(1);}
    }

  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo-link">
      <img src="logo_liga.png" alt="Logo LPI">
    </a>
  </header>

  <main>
    <h1>Primera División</h1>
    <div class="proximamente">PROXIMAMENTE</div>
  </main>
</body>
</html>

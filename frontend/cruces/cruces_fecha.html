<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRUCES · Planilla (auto)</title>
    <link rel="stylesheet" href="./cruces_fecha.css" />
  </head>
  <body>
  <div class="header-bg">
    <div class="container">
      <header class="lpi-top" role="banner">
        <a href="../index.html" class="logo-link" id="homeLink">
          <img class="liga-logo" id="logoImg" src="../logo_liga.png" width="60" height="60" />
        </a>
        <h1 class="title">CRUCES</h1>
        <nav class="actions">
          <a class="btn" id="btnVolver" href="#">VOLVER</a>
        </nav>
      </header>
    </div>
  </div>
  <div id="pageScaleRoot">
    <main class="container content-under-header" id="app-root">
      <div id="appError" class="error" style="display:none;"></div>
      <div class="cruces-grid" id="crucesGrid">
        <section id="planilla-root-left"></section>
        <section id="planilla-root-right"></section>
      </div>
      <div class="validate-cta" id="validateCta" style="display:none;">
        <button class="btn-validate" id="btnValidarGlobal">VALIDAR PLANILLA</button>
      </div>
    </main>
    <template id="card-template">
      <div class="wrap">
        <div class="card">
          <h2 class="title"></h2>
          <div class="meta"></div>
          <div class="sections"></div>
          <div class="totals-wrap">
            <div class="totals-chip">
              <span class="label">TRIÁNGULOS TOTALES</span>
              <div class="total-box">
                <input class="total-input" value="0" readonly />
              </div>
            </div>
          </div>
          <div class="wins-wrap">
            <div class="wins-chip">
              <span class="label">PUNTOS</span>
              <div class="wins-box" data-wins>0</div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
  <script src="../config.js"></script>
  <script src="./cruces_fecha.js" defer></script>
</body>
</html>

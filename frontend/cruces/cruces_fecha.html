<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRUCES · Planilla (auto)</title>
    <link rel="stylesheet" href="./cruces_fecha_responsive_fix.css" />
  </head>
  <body>

  <!-- HEADER FUERA DEL #pageScaleRoot -->
  <div class="header-bg">
    <div class="container">
      <header class="lpi-top" role="banner">
        <a href="../index.html" aria-label="Ir al inicio" class="logo-link" id="homeLink">
          <img class="liga-logo" id="logoImg" src="../logo_liga.png" alt="Logo de la liga" width="60" height="60" />
        </a>
        <h1 class="header-title" id="headerTitle">CRUCES</h1>
        <nav class="actions" aria-label="Acciones de navegación">
          <button class="btn" id="btnDownloadPdf" type="button" aria-label="Descargar PDF">DESCARGAR PDF</button>
          <button class="btn" id="btnDownloadJpg" type="button" aria-label="Descargar JPG">DESCARGAR JPG</button>
          <a class="btn" id="btnVolver" href="#" aria-label="Volver">VOLVER</a>
        </nav>
      </header>
      <div id="testModeBanner" class="test-mode-banner" hidden>
        MODO PRUEBA: esta pantalla simula el acceso como equipo desde admin y no envía validaciones al backend.
      </div>
    </div>
  </div>

  <div id="pageScaleRoot">

    <main class="container content-under-header" id="app-root">
      <div id="appError" class="error" style="display:none;"></div>
      <div class="cruces-grid" id="crucesGrid">
        <section id="planilla-root-left" aria-label="Planilla local"></section>
        <section id="planilla-root-right" aria-label="Planilla visitante"></section>
      </div>

      <div class="validate-cta" id="validateCta" hidden>
        <button class="btn-validate" id="btnValidarGlobal">VALIDAR PLANILLA</button>
        <a class="btn btn-picture disabled" id="btnSubirFotos" href="#" aria-disabled="true">SUBIR FOTOS</a>
      </div>
    </main>

    <template id="card-template">
      <div class="wrap">
        <div class="card">
          <h2 class="title"></h2>
          <div class="meta"></div>
          <div class="hint" aria-live="polite"></div>
          <div class="sections"></div>

          <div class="totals-wrap">
            <div class="totals-chip">
              <span class="label">TRIÁNGULOS TOTALES</span>
              <div class="total-box">
                <input class="total-input" value="0" readonly />
              </div>
            </div>
          </div>

          <div class="wins-wrap">
            <div class="wins-chip">
              <span class="label">PUNTOS</span>
              <div class="wins-box" data-wins>0</div>
            </div>
          </div>

        </div>
      </div>
    </template>

  </div>

  <script src="../config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="./cruces_fecha_responsive_fix.js" defer></script>

</body>
</html>

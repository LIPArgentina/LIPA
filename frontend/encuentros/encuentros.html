<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ENCUENTROS · Resultados</title>
    <link rel="stylesheet" href="../cruces/cruces_fecha.css" />
    <link rel="stylesheet" href="./encuentros.css" />
  </head>
  <body>
    <div class="header-bg">
      <div class="container">
        <header class="lpi-top" role="banner">
          <a href="../index.html" aria-label="Ir al inicio" class="logo-link" id="homeLink">
            <img class="liga-logo" id="logoImg" src="../logo_liga.png" alt="Logo de la liga" width="60" height="60" />
          </a>
          <h1 class="title" id="headerTitle">ENCUENTROS</h1>
          <nav class="actions" aria-label="Acciones de navegación">
            <a class="btn" id="btnVolver" href="#" aria-label="Volver">VOLVER</a>
          </nav>
        </header>
      </div>
    </div>

    <main class="container encuentros-page" id="app-root">
      <section class="hero-card">
        <div class="hero-top">
          <div>
            <div class="hero-sub" id="categoryLabel">Categoría</div>
            <h2 class="hero-title" id="heroTitle">Resultados validados</h2>
          </div>
          <div class="date-pill" id="datePill">--/--/----</div>
        </div>
        <div class="meta" id="metaText">Cargando resultados...</div>
      </section>

      <div id="appError" class="error" style="display:none;"></div>
      <div id="resultsContainer" class="results-list"></div>
    </main>

    <template id="encounter-template">
      <article class="encounter-shell">
        <div class="encounter-head">
          <div class="encounter-title"></div>
          <button class="photos-btn" type="button" data-open-photos>VER FOTOS</button>
        </div>
        <div class="cruces-grid encounter-grid">
          <section class="encounter-left"></section>
          <section class="encounter-right"></section>
        </div>
      </article>
    </template>

    <template id="card-template">
      <div class="wrap">
        <div class="card">
          <h2 class="title"></h2>
          <div class="meta"></div>
          <div class="hint" aria-live="polite"></div>
          <div class="sections"></div>

          <div class="totals-wrap">
            <div class="totals-chip">
              <span class="label">TRIÁNGULOS TOTALES</span>
              <div class="total-box">
                <input class="total-input" value="0" readonly />
              </div>
            </div>
          </div>

          <div class="wins-wrap">
            <div class="wins-chip">
              <span class="label">PUNTOS</span>
              <div class="wins-box" data-wins>0</div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <div class="photos-modal" id="photosModal" hidden>
      <div class="photos-backdrop" data-close-photos="1"></div>
      <div class="photos-dialog" role="dialog" aria-modal="true" aria-labelledby="photosModalTitle">
        <div class="photos-header">
          <div>
            <h2 id="photosModalTitle">Fotos del encuentro</h2>
            <div class="photos-subtitle" id="photosModalSubtitle"></div>
          </div>
          <button class="photos-close" id="btnClosePhotos" type="button" aria-label="Cerrar">×</button>
        </div>

        <div class="photos-body">
          <div id="photosStatus" class="photos-status"></div>
          <div class="photos-stage">
            <img id="photosMainImage" class="photos-main-image" alt="Foto del encuentro" />
          </div>
          <div id="photosCounter" class="photos-counter"></div>
          <div id="photosPager" class="photos-pager"></div>
        </div>
      </div>
    </div>

    <script src="../config.js"></script>
    <script src="./encuentros.js" defer></script>
  </body>
</html>

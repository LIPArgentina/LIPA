<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Encuentros | Liga de Pool Independiente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>
  <link href="encuentros.css" rel="stylesheet"/>
</head>
<body>
  <div class="container">
    <header>
      <a class="logo-link" href="../index.html" aria-label="Ir al inicio">
        <img class="liga-logo" src="../logo_liga.png" alt="Logo de la liga" width="60" height="60"/>
      </a>
      <div class="title">ENCUENTROS</div>
      <nav class="actions"><a class="btn" href="#" id="btnVolver">VOLVER</a></nav>
    </header>

    <section class="hero-card">
      <div class="hero-top">
        <div>
          <div class="hero-sub" id="categoryLabel">Categoría</div>
          <h1 id="heroTitle">Encuentros de la fecha</h1>
        </div>
        <div class="date-pill" id="datePill">--/--/----</div>
      </div>
      <div class="meta" id="metaText"></div>
    </section>

    <main id="groupsContainer" class="groups"></main>
  </div>

  <template id="tpl-group">
    <section class="group-card">
      <h2 class="group-title"></h2>
      <div class="rule"></div>
      <div class="rows"></div>
    </section>
  </template>

  <script type="module" src="encuentros.js"></script>
</body>
</html>
